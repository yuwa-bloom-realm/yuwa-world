<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Yuwa Entertainment World</title>
<link rel="apple-touch-icon" href="app-icon.png">
<link rel="icon" href="app-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yuwa Entertainment">
<style>
:root{
  --ink:#e9e4f5;
  --gold:#e8c887;
  --aqua:#7fd8d0;
  --deep:#0a0a1f;
  --panel:rgba(16,14,38,.94);
  --line:rgba(232,200,135,.28);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--deep);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  -webkit-user-select:none;user-select:none;}

/* ============ 共通レイヤ ============ */
.layer{position:fixed;inset:0;display:none}
.layer.on{display:block}

/* ============ 0. ふれて、はじめる ============ */
#gate{background:radial-gradient(ellipse at 50% 55%,#151033 0%,#05050f 70%);
  display:none;place-items:center;text-align:center}
#gate.on{display:grid}
.gate-star{width:10px;height:10px;border-radius:50%;background:#fff;margin:0 auto 26px;
  box-shadow:0 0 12px 3px #fff,0 0 34px 10px rgba(160,200,255,.8);
  animation:breathe 3.2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.gate-txt{font-size:17px;letter-spacing:.42em;color:rgba(233,228,245,.72);text-indent:.42em}
#replayGate{margin-top:30px;font-size:11px;letter-spacing:.18em;
  color:rgba(232,200,135,.55);text-indent:.18em;
  border-bottom:1px solid rgba(232,200,135,.28);
  display:inline-block;padding-bottom:4px}

/* ============ 1. オープニング ============ */
#opening{background:#03030c;overflow:hidden}
#op-stage{position:absolute;inset:0}

.op-el{position:absolute;opacity:0}

/* 遠景の線路 */
#rail{left:50%;top:56%;width:min(80vw,420px);height:180px;
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,235,190,.16) 0%,transparent 70%)}

/* 近づく列車 */
#train{left:50%;top:54%;width:min(150vw,900px);z-index:4;
  transform:translate(-50%,-50%) scale(.10)}
#train img{width:100%;display:block}

/* 駅 */
#station{left:50%;top:56%;width:min(90vw,520px);height:min(62vh,540px);
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,rgba(60,90,120,.34) 0%,rgba(30,45,80,.16) 45%,transparent 72%)}

/* 看板 */
#sign{left:50%;top:13%;transform:translate(-50%,-50%);text-align:center;width:92vw;z-index:5;
  padding:14px 10px;
  background:radial-gradient(ellipse at 50% 50%,rgba(3,3,12,.92) 0%,rgba(3,3,12,.65) 55%,transparent 78%)}
.sign-en{font-size:clamp(18px,5.6vw,27px);letter-spacing:.14em;color:var(--gold)}
.sign-jp{margin-top:12px;font-size:clamp(10.5px,3.2vw,13px);letter-spacing:.24em;
  color:rgba(233,228,245,.86)}
#sign.lit .sign-en{text-shadow:0 0 14px rgba(232,200,135,.95),0 0 44px rgba(232,200,135,.55)}
.sign-en,.sign-jp{transition:text-shadow 1.1s ease}

/* 扉 */
#doors{position:absolute;left:50%;top:56%;opacity:0;transform:translate(-50%,-50%);
  height:min(60vh,500px);max-width:88vw;display:flex;align-items:center;z-index:3;
  filter:drop-shadow(0 0 40px rgba(0,0,0,.85))}
.door{height:100%;width:auto;max-width:44vw;object-fit:contain;display:block;
  transform-origin:var(--hinge) center;
  transition:transform 1.9s cubic-bezier(.45,0,.15,1);
  will-change:transform}
#doorL{--hinge:left}
#doorR{--hinge:right}
/* 観音開き：奥へ開く */
#opening.open #doorL{transform:perspective(1100px) rotateY(-88deg)}
#opening.open #doorR{transform:perspective(1100px) rotateY(88deg)}
/* 扉の隙間から漏れる光 */
#seam{position:absolute;left:50%;top:56%;width:3px;height:min(60vh,500px);
  transform:translate(-50%,-50%);z-index:2;opacity:0;
  background:linear-gradient(180deg,transparent,#fff6dc 18%,#fff6dc 82%,transparent);
  box-shadow:0 0 26px 10px rgba(255,240,200,.9);
  transition:opacity 1s ease,width 1.6s ease}
#opening.open #seam{opacity:1;width:150px}

/* 光の溢れ */
#flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#fff 0%,rgba(255,245,220,.6) 32%,transparent 70%);
  opacity:0;pointer-events:none;z-index:4}

#skip{position:absolute;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));
  z-index:9;font-size:12px;letter-spacing:.16em;color:rgba(233,228,245,.5);
  border:1px solid rgba(233,228,245,.22);border-radius:99px;padding:8px 16px;
  background:rgba(0,0,0,.3)}

/* ============ 2. マップ ============ */
#world{background:var(--deep)}
#world.on{display:flex;flex-direction:column}
#viewport{position:relative;flex:1;min-height:0;overflow:hidden;touch-action:none}
#canvas{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#mapimg{display:block;width:100%;height:auto;pointer-events:none;border-radius:2px}

/* ホットスポット：%配置なので拡大してもズレない */
.spot{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
.spot-dot{width:36px;height:36px;border-radius:50%;
  border:2px solid #ffe6b0;background:rgba(20,16,40,.42);
  display:grid;place-items:center;font-size:13px;color:#fff3d6;
  box-shadow:0 0 16px rgba(232,200,135,.55),0 0 4px rgba(0,0,0,.75),
             inset 0 0 10px rgba(0,0,0,.35);
  animation:pulse 2.6s ease-in-out infinite}
.spot.soon .spot-dot{border-color:rgba(255,255,255,.42);color:rgba(255,255,255,.55);
  background:rgba(15,12,32,.34);
  box-shadow:0 0 6px rgba(0,0,0,.6);animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(232,200,135,.45),0 0 4px rgba(0,0,0,.7)}
  50%{box-shadow:0 0 28px 7px rgba(232,200,135,.7),0 0 4px rgba(0,0,0,.7)}}
.spot-label{display:none}   /* マップ画像に名前が描かれているので非表示 */
.spot.soon .spot-label{color:rgba(233,228,245,.38)}

/* 上部バー */
#topbar{position:absolute;top:0;left:0;right:0;z-index:5;
  padding:calc(10px + env(safe-area-inset-top)) 16px 22px;
  background:linear-gradient(180deg,rgba(4,4,14,.92) 0%,rgba(4,4,14,.6) 55%,transparent 100%);
  display:flex;justify-content:space-between;align-items:center}
#title{font-size:13px;letter-spacing:.2em;color:var(--gold);
  text-shadow:0 0 12px #000,0 1px 3px #000}
#clock{font-size:11px;letter-spacing:.1em;color:rgba(233,228,245,.72);
  text-shadow:0 0 12px #000,0 1px 3px #000}
#sound{font-size:15px;line-height:1;opacity:.85;padding:4px 2px;
  filter:drop-shadow(0 0 6px #000)}

/* 下部タブ */
#tabs{position:relative;flex:none;z-index:5;
  display:flex;background:rgba(8,7,22,.92);
  border-top:1px solid rgba(232,200,135,.16);
  padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:10px;letter-spacing:.08em;
  color:rgba(233,228,245,.55)}
.tab.active{color:var(--gold)}
.tab i{display:block;font-size:17px;font-style:normal;margin-bottom:3px}

/* ============ 3. 案内パネル ============ */
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:20;
  background:var(--panel);border-top:1px solid var(--line);
  border-radius:20px 20px 0 0;
  transform:translateY(102%);transition:transform .42s cubic-bezier(.32,.72,0,1);
  max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(26px + env(safe-area-inset-bottom));
  box-shadow:0 -14px 44px rgba(0,0,0,.7)}
#sheet.up{transform:translateY(0)}
#scrim{position:fixed;inset:0;z-index:19;background:rgba(0,0,0,.55);
  opacity:0;pointer-events:none;transition:opacity .35s}
#scrim.on{opacity:1;pointer-events:auto}
.grab{width:38px;height:4px;border-radius:2px;background:rgba(233,228,245,.28);
  margin:11px auto 4px}
.sheet-in{padding:14px 22px 0}
.sheet-no{font-size:11px;letter-spacing:.28em;color:var(--aqua)}
.sheet-ttl{font-size:22px;margin:7px 0 12px;color:var(--gold);letter-spacing:.06em}
.sheet-lead{font-size:13.5px;line-height:1.95;color:rgba(233,228,245,.86)}
.sheet-list{margin:16px 0 0;list-style:none}
.sheet-list li{font-size:13px;line-height:2.1;color:rgba(233,228,245,.72);
  padding-left:17px;position:relative}
.sheet-list li::before{content:"✦";position:absolute;left:0;color:var(--aqua);font-size:9px;top:.55em}
.enter{display:block;width:100%;margin-top:24px;padding:16px;
  border:1px solid var(--gold);border-radius:10px;
  background:linear-gradient(180deg,rgba(232,200,135,.16),rgba(232,200,135,.05));
  color:var(--gold);font-size:15px;letter-spacing:.22em;
  font-family:inherit;text-indent:.22em}
.enter:active{background:rgba(232,200,135,.3)}
.enter.soon{border-color:rgba(233,228,245,.2);color:rgba(233,228,245,.4);background:none}
.links{margin-top:14px;display:grid;gap:9px}
.link{padding:13px 16px;border:1px solid rgba(127,216,208,.3);border-radius:9px;
  color:var(--aqua);font-size:13.5px;letter-spacing:.08em;
  display:flex;justify-content:space-between;align-items:center}
.link:active{background:rgba(127,216,208,.12)}
.link span{opacity:.5;font-size:11px}

/* ============ 4. Yuwa Letter ============ */
/* お手紙が待っている駅 */
.spot.hasmail .spot-dot{
  border-color:#fff2d4;color:#fff8e6;
  background:rgba(232,200,135,.3);
  animation:mailglow 2.2s ease-in-out infinite}
@keyframes mailglow{
  0%,100%{box-shadow:0 0 18px 4px rgba(232,200,135,.55)}
  50%{box-shadow:0 0 34px 12px rgba(255,235,190,.95)}}
.spot.hasmail .spot-label{color:#fff3d8;text-shadow:0 0 12px rgba(232,200,135,.8),0 1px 6px #000}
.mailmark{position:absolute;top:-7px;right:-7px;font-size:12px;
  filter:drop-shadow(0 0 6px rgba(232,200,135,.9))}

/* 世界の中に届く手紙 */
/* 猫が知らせに来る */
#toast{position:fixed;left:0;right:0;
  bottom:calc(84px + env(safe-area-inset-bottom));z-index:30;
  padding:0 14px;pointer-events:none;
  display:flex;align-items:flex-end;gap:10px;
  opacity:0;transform:translateY(26px);
  transition:opacity 1.2s ease,transform 1.2s cubic-bezier(.2,.8,.3,1)}
#toast.in{opacity:1;transform:translateY(0);pointer-events:auto}

/* 立ち絵（今は仮。画像が来たら #catImg に差し替え） */
#cat{flex:none;width:118px;height:168px;
  display:grid;place-items:end center;font-size:62px;line-height:1;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.75));
  animation:catBob 4s ease-in-out infinite}
#cat img{width:100%;height:100%;object-fit:contain;object-position:bottom;display:block}
@keyframes catBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* 吹き出し */
#bubble{position:relative;flex:1;min-width:0;margin-bottom:24px;
  background:linear-gradient(180deg,rgba(255,252,244,.98),rgba(246,240,228,.98));
  border:1px solid rgba(180,150,90,.55);
  border-radius:16px;padding:14px 15px;
  box-shadow:0 10px 30px rgba(0,0,0,.55)}
#bubble::before{content:"";position:absolute;left:-9px;bottom:26px;
  width:0;height:0;border:9px solid transparent;
  border-right-color:rgba(180,150,90,.55)}
#bubble::after{content:"";position:absolute;left:-7px;bottom:26px;
  width:0;height:0;border:8px solid transparent;
  border-right-color:rgba(252,248,238,.98)}
.bub-tx{font-size:12.5px;line-height:1.8;color:#3a3020;letter-spacing:0;
  white-space:pre-line;word-break:keep-all;overflow-wrap:anywhere}
.bub-go{margin-top:9px;font-size:11px;letter-spacing:.12em;
  color:#9a7226;border-bottom:1px solid rgba(154,114,38,.4);
  display:inline-block;padding-bottom:2px}

/* お手紙リスト */
.mailbox{margin:20px 0 4px;padding:16px 15px 6px;
  border:1px solid rgba(232,200,135,.35);border-radius:13px;
  background:linear-gradient(180deg,rgba(232,200,135,.09),rgba(232,200,135,.02))}
.mailbox-hd{font-size:11.5px;letter-spacing:.18em;color:var(--gold);margin-bottom:13px}
.letter{border:1px solid rgba(232,200,135,.18);border-radius:11px;
  padding:15px 17px;margin-bottom:11px;background:rgba(232,200,135,.04)}
.letter.unread{border-color:rgba(232,200,135,.5);background:rgba(232,200,135,.09)}
.letter-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.letter-date{font-size:10.5px;letter-spacing:.14em;color:rgba(233,228,245,.45)}
.letter-new{font-size:9.5px;letter-spacing:.16em;color:#f0a8b8;
  border:1px solid rgba(240,168,184,.5);border-radius:99px;padding:2px 8px}
.letter-ttl{font-size:15px;color:var(--gold);margin-bottom:8px;letter-spacing:.04em}
.letter-bd{font-size:13px;line-height:1.95;color:rgba(233,228,245,.78);white-space:pre-wrap}
.letter-go{display:inline-block;margin-top:12px;font-size:12.5px;
  color:var(--aqua);border-bottom:1px solid rgba(127,216,208,.4);padding-bottom:2px}
.empty{text-align:center;padding:46px 0;font-size:13px;
  color:rgba(233,228,245,.4);line-height:2}
</style>
</head>
<body>

<!-- ===== 0. GATE ===== -->
<div id="gate" class="layer on">
  <div>
    <div class="gate-star"></div>
    <div class="gate-txt">ふれて、はじめる</div>
    <div id="replayGate">はじめから見る</div>
  </div>
</div>

<!-- ===== 1. OPENING ===== -->
<div id="opening" class="layer">
  <div id="op-stage">
    <div id="rail" class="op-el"></div>
    <div id="train" class="op-el"><img id="trainImg" alt=""></div>
    <div id="station" class="op-el"></div>
    <div id="sign" class="op-el">
      <div class="sign-en">Yuwa Entertainment</div>
      <div class="sign-jp">ようこそ、あなたの物語へ。</div>
    </div>
    <div id="seam"></div>
    <div id="doors">
      <img id="doorL" class="door" alt="">
      <img id="doorR" class="door" alt="">
    </div>
    <div id="flash"></div>
  </div>
  <div id="skip">スキップ →</div>
</div>

/* =========================================================
   ②  時刻でマップ画像を切り替え（画像を置けば自動で効く）
   ========================================================= */
function timeSlot(h){
  if(h>=5  && h<10) return "morning";
  if(h>=10 && h<16) return "day";
  if(h>=16 && h<19) return "sunset";
  return "night";
}
const SLOT_JP = {morning:"朝", day:"昼", sunset:"夕暮れ", night:"夜"};

/* =========================================================
   ③  マップ描画
   ========================================================= */
const canvas = document.getElementById("canvas");
const mapimg = document.getElementById("mapimg");
const viewport = document.getElementById("viewport");

/* 拡張子は .jpeg / .jpg どちらでも読めるようにする */
function loadMap(s){
  const tries=[`map-${s}.jpeg`, `map-${s}.jpg`, `map-${s}.png`];
  let i=0;
  const next=()=>{
    if(i>=tries.length){ mapimg.onerror=null; return; }
    mapimg.onerror=next;
    mapimg.src=tries[i++];
  };
  next();
}

const slot = timeSlot(new Date().getHours());
document.getElementById("clock").textContent = SLOT_JP[slot]+"の世界";
loadMap(slot);

/* =========================================================
   BGM — 開いた時間帯の曲がループで流れる
   bgm-morning / bgm-day / bgm-sunset / bgm-night
   mp3は末尾に無音が入るので、2つのAudioを重ねて継ぎ目を消す
   ========================================================= */
const MUTE_KEY = "yuwa_muted";
const VOL = 0.55, XFADE = 1.6;   /* 重ねる秒数 */
let bgmA=null, bgmB=null, bgmFade=null, bgmTimer=null, bgmSrc="";

function makeAudio(){
  const a=new Audio();
  a.preload="auto"; a.volume=0; a.loop=false;
  return a;
}

function initBGM(){
  bgmA=makeAudio(); bgmB=makeAudio();
  const tries=[`bgm-${slot}.mp3`, `bgm-${slot}.m4a`, `bgm-${slot}.ogg`];
  let i=0;
  const next=()=>{
    if(i>=tries.length){ bgmA.onerror=null; return; }
    bgmA.onerror=next;
    bgmSrc=tries[i++];
    bgmA.src=bgmSrc; bgmB.src=bgmSrc;
  };
  next();
}

/* 再生中の曲が終わりに近づいたら、もう片方を頭から重ねる */
function scheduleLoop(cur, other){
  clearInterval(bgmTimer);
  bgmTimer=setInterval(()=>{
    if(localStorage.getItem(MUTE_KEY)==="1") return;
    const d=cur.duration;
    if(!d || isNaN(d)) return;
    if(d-cur.currentTime <= XFADE){
      other.currentTime=0; other.volume=0;
      const p=other.play(); if(p&&p.catch) p.catch(()=>{});
      rampVolume(other, VOL, XFADE*1000);
      rampVolume(cur, 0, XFADE*1000, ()=>{ cur.pause(); });
      scheduleLoop(other, cur);
    }
  }, 200);
}

function rampVolume(el, target, ms, done){
  const from=el.volume, steps=Math.max(1,Math.round(ms/50));
  let n=0;
  const id=setInterval(()=>{
    n++;
    el.volume=Math.min(1,Math.max(0, from+(target-from)*(n/steps)));
    if(n>=steps){ clearInterval(id); if(done) done(); }
  },50);
  return id;
}

function startBGM(){
  if(!bgmA || localStorage.getItem(MUTE_KEY)==="1") return;
  if(!bgmA.paused || !bgmB.paused) return;   /* すでに鳴っている */
  const p=bgmA.play();
  const go=()=>{ rampVolume(bgmA, VOL, 2500); scheduleLoop(bgmA, bgmB); };
  if(p&&p.then) p.then(go).catch(()=>{}); else go();
}

function setMuted(m){
  localStorage.setItem(MUTE_KEY, m ? "1" : "0");
  document.getElementById("sound").textContent = m ? "🔇" : "🔊";
  if(m){
    clearInterval(bgmTimer);
    [bgmA,bgmB].forEach(a=> rampVolume(a, 0, 500, ()=>a.pause()));
  }else{
    startBGM();
  }
}

initBGM();

/* =========================================================
   ④  ピンチズーム / パン / ダブルタップ
   ========================================================= */
let scale=1, tx=0, ty=0, minScale=1, fillScale=1;
const MAXS = 8;

function apply(){ canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }

function clamp(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const w = baseW*scale, h = baseH*scale;
  tx = w<=vw ? (vw-w)/2 : Math.min(0, Math.max(vw-w, tx));
  ty = h<=vh ? (vh-h)/2 : Math.min(0, Math.max(vh-h, ty));
}

let baseW=0, baseH=0;
function fit(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  if(!vw || !vh) return;            // まだ表示されていないときは何もしない
  const nw = mapimg.naturalWidth || 1400, nh = mapimg.naturalHeight || 933;
  baseW = vw;                       // 幅ぴったりを基準に
  baseH = vw * nh / nw;
  canvas.style.width  = baseW+"px";
  canvas.style.height = baseH+"px";
  minScale = 1;                     // 幅いっぱいより小さくはしない
  /* 縦の黒帯を消す：画面の高さを埋めるまで寄る（最大2.2倍） */
  fillScale = Math.min(3.2, Math.max(1, vh/baseH));
  scale = fillScale;
  tx = (vw-baseW*scale)/2;
  ty = (vh-baseH*scale)/2;
  clamp(); apply();
}
mapimg.addEventListener("load", fit);
window.addEventListener("resize", ()=>{ fit(); });
/* キャッシュ済みだと load が先に終わっていることがあるので、その場合はすぐ実行 */
if(mapimg.complete && mapimg.naturalWidth) fit();
else requestAnimationFrame(()=>{ if(mapimg.naturalWidth) fit(); });

/* zoom を 1点中心で行う */
function zoomAt(cx, cy, next){
  next = Math.max(minScale, Math.min(MAXS, next));
  const r = viewport.getBoundingClientRect();
  const px = cx - r.left, py = cy - r.top;
  const k = next/scale;
  tx = px - (px - tx)*k;
  ty = py - (py - ty)*k;
  scale = next;
  clamp(); apply();
}

let pts = new Map(), startDist=0, startScale=1, startMid={x:0,y:0}, panStart=null, moved=false;

viewport.addEventListener("pointerdown",e=>{
  viewport.setPointerCapture(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  moved=false;
  if(pts.size===1){ panStart={x:e.clientX-tx, y:e.clientY-ty}; }
  if(pts.size===2){
    const [a,b]=[...pts.values()];
    startDist = Math.hypot(a.x-b.x, a.y-b.y);
    startScale = scale;
    startMid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
    panStart = null;
  }
});

viewport.addEventListener("pointermove",e=>{
  if(!pts.has(e.pointerId)) return;
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===2){
    const [a,b]=[...pts.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if(startDist>0) zoomAt(startMid.x, startMid.y, startScale*(d/startDist));
    moved=true;
  }else if(pts.size===1 && panStart){
    const nx = e.clientX-panStart.x, ny = e.clientY-panStart.y;
    if(Math.abs(nx-tx)>2||Math.abs(ny-ty)>2) moved=true;
    tx=nx; ty=ny; clamp(); apply();
  }
},{passive:false});

["pointerup","pointercancel"].forEach(ev=>
  viewport.addEventListener(ev,e=>{
    pts.delete(e.pointerId);
    if(pts.size<2) startDist=0;
    if(pts.size===1){ const p=[...pts.values()][0]; panStart={x:p.x-tx,y:p.y-ty}; }
    if(pts.size===0) panStart=null;
  })
);

/* ダブルタップで寄る／戻る */
let lastTap=0;
viewport.addEventListener("click",e=>{
  const now=Date.now();
  if(now-lastTap<300 && !moved){
    zoomAt(e.clientX, e.clientY, scale>fillScale*1.4 ? fillScale : fillScale*2.2);
  }
  lastTap=now;
});

const sheet=document.getElementById("sheet"),

function openSheet(a){
  const links = (a.links||[]).map(l=>
    `<a class="link" href="${l.u}">${l.t}<span>›</span></a>`).join("");

  /* 駅を開いたとき、未読のお手紙をその場で渡す */
  let mail = "";

    mail = `<div class="mailbox">
      <div class="mailbox-hd">✉️ 届いているお手紙</div>
      ${letterHTML(unread().length ? unread() : LETTERS)}
    </div>`;
  }

  body.innerHTML = `
    <div class="sheet-no">AREA ${a.no}</div>
    <div class="sheet-ttl">${a.name}</div>
    <div class="sheet-lead">${a.lead}</div>
    ${mail}
    <ul class="sheet-list">${a.items.map(i=>`<li>${i}</li>`).join("")}</ul>
    ${links ? `<div class="links">${links}</div>` : ""}
    <button class="enter ${a.open?"":"soon"}">${a.open ? (a.cta||"入場する") : "まもなく開きます"}</button>`;
  if(a.open){
    body.querySelector(".enter").onclick = ()=>{ if(a.url) location.hash=a.url; closeSheet(); };
  }
  sheet.classList.add("up"); scrim.classList.add("on");
  if(mail) markAllRead();
}
function closeSheet(){ sheet.classList.remove("up"); scrim.classList.remove("on"); }
scrim.addEventListener("click", closeSheet);

/* 下方向スワイプで閉じる */
let sy=null;
sheet.addEventListener("touchstart",e=>{ if(sheet.scrollTop<=0) sy=e.touches[0].clientY; },{passive:true});
sheet.addEventListener("touchmove",e=>{
  if(sy===null) return;
  const d=e.touches[0].clientY-sy;
  if(d>0) sheet.style.transform=`translateY(${d}px)`;
},{passive:true});
sheet.addEventListener("touchend",e=>{
  if(sy===null) return;
  const d=e.changedTouches[0].clientY-sy;
  sheet.style.transform="";
  if(d>90) closeSheet();
  sy=null;
});

const READ_KEY = "yuwa_read_letters";

/* --- お手紙の中身を組み立てる --- */
function letterHTML(list){
  if(!list.length) return `<div class="empty">まだお手紙は届いていません。<br>また、のぞきにきてね。</div>`;
  return list.map(l => {
    const isNew = !readSet.has(l.id);
    return `<div class="letter ${isNew?"unread":""}">
      <div class="letter-top">
        <div class="letter-date">${l.date}</div>
        ${isNew ? `<div class="letter-new">NEW</div>` : ""}
      </div>
      <div class="letter-ttl">${l.title}</div>
      <div class="letter-bd">${l.body}</div>
      ${l.go ? `<a class="letter-go" href="${l.go.u}">${l.go.t} →</a>` : ""}
    </div>`;
  }).join("");
}

/* =========================================================
   ⑦  オープニング演出
   ========================================================= */
const gate=document.getElementById("gate"),
      opening=document.getElementById("opening"),
      world=document.getElementById("world");

function show(el){ [gate,opening,world].forEach(x=>x.classList.remove("on")); el.classList.add("on"); }

const SEEN = "yuwa_visited";
let opTimers=[];

function fadeIn(id,dur=800){
  const el=document.getElementById(id);
  el.style.transition=`opacity ${dur}ms ease`;
  el.style.opacity=1;
}
function at(ms,fn){ opTimers.push(setTimeout(fn,ms)); }

function playOpening(short){
  show(opening);
  const T = short ? 0 : 1;   // shortなら前半スキップ

  if(!short){
    fadeIn("rail",900);
    at(400,()=>{
      const t=document.getElementById("train");
      t.style.transition="transform 2800ms cubic-bezier(.3,0,.6,1), opacity 700ms ease";
      t.style.opacity=1;
      t.style.transform="translate(-50%,-48%) scale(.95)";
    });
    at(1900,()=>{ /* 汽笛：audio差し込み位置 */ });
    at(3600,()=>{   /* 十分に見せてから、手前を通り過ぎる */
      const t=document.getElementById("train");
      t.style.transition="transform 1300ms cubic-bezier(.45,0,.9,1), opacity 1200ms ease .2s";
      t.style.transform="translate(-50%,-6%) scale(2.6)";
      t.style.opacity=0;
      fadeIn("station",1100);
    });
  }else{
    document.getElementById("station").style.opacity=1;
  }

  const base = short ? 200 : 5000;

  at(base,      ()=>{ fadeIn("doors",900); });
  at(base+400,  ()=>{ fadeIn("sign",700); });
  at(base+900,  ()=>{ document.getElementById("sign").classList.add("lit"); });
  at(base+1700, ()=>{ opening.classList.add("open"); });   /* 扉が開きはじめる */
  at(base+3200, ()=>{
    const f=document.getElementById("flash");
    f.style.transition="opacity 900ms ease";
    f.style.opacity=1;
    /* 光が広がる音：audio差し込み位置 */
  });
  at(base+3900, ()=>{ toWorld(); });
}

function toWorld(){
  opTimers.forEach(clearTimeout); opTimers=[];
  show(world);
  fit();
  scale = fillScale*2.6; clamp(); apply();
  canvas.style.transition="transform 2200ms cubic-bezier(.25,.8,.3,1)";
  requestAnimationFrame(()=>{
    fit();
    setTimeout(()=>{ canvas.style.transition=""; },2300);
  });
  /* ズームアウトの途中で、静かに浮かびはじめる */
  setTimeout(showToast, 900);
  localStorage.setItem(SEEN,"1");
}

gate.addEventListener("click",(e)=>{
  startBGM();   /* 最初のタップで音が解禁される（iOSの仕様） */
  const full = e.target.id==="replayGate" || localStorage.getItem(SEEN)!=="1";
  playOpening(!full);
});
document.getElementById("skip").addEventListener("click",e=>{
  e.stopPropagation(); toWorld();
});
